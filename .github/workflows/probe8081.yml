name: Probe 8081 reachability (temp)

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: curl RecordInfo on :8081
        run: |
          echo "HTTP code + first bytes:"
          curl -sS --max-time 20 -o body.txt -w "code=%{http_code} time=%{time_total}s size=%{size_download}\n" \
            "http://www.chaosonline.co.kr:8081/ClientJson/RecordInfo.aspx?ano=27938&recordType=0&year=0&seasonNo=0&characterNo=0&tabType=S" || echo "curl failed rc=$?"
          echo "---- body head ----"
          head -c 400 body.txt || true
